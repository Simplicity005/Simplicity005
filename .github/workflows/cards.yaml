name: Update README Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every day at midnight
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Create the directory explicitly
      - name: Create profile directory
        run: mkdir -p profile

      # Generates your main stats card
      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=Simplicity005&show_icons=true&theme=radical'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Generates your top programming languages card
      - name: Generate Top Langs Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=Simplicity005&layout=compact&theme=radical'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Commit and push the generated images back to the repo
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Auto-generated stats cards" || exit 0
          git push
